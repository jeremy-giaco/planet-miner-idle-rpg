name: Deploy to Roblox

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rojo
        run: |
          ROJO_VERSION=$(curl -s https://api.github.com/repos/rojo-rbx/rojo/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          echo "Installing Rojo $ROJO_VERSION"
          curl -L "https://github.com/rojo-rbx/rojo/releases/download/v${ROJO_VERSION}/rojo-${ROJO_VERSION}-linux-x86_64.zip" -o rojo.zip
          unzip rojo.zip
          chmod +x rojo
          sudo mv rojo /usr/local/bin/rojo
          rojo --version

      - name: Build place file
        run: rojo build default.project.json -o planet-miner-build.rbxl

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: "Release #${{ github.run_number }}"
          body: "Automated release from commit ${{ github.sha }}"
          files: planet-miner-build.rbxl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Roblox
        run: |
          echo "Universe ID set: ${{ secrets.ROBLOX_UNIVERSE_ID != '' }}"
          echo "Place ID set: ${{ secrets.ROBLOX_PLACE_ID != '' }}"
          echo "API Key set: ${{ secrets.ROBLOX_API_KEY != '' }}"
          echo "File size: $(wc -c < planet-miner-build.rbxl) bytes"
          RESPONSE=$(curl -s -X POST \
            "https://apis.roblox.com/universes/v1/${{ secrets.ROBLOX_UNIVERSE_ID }}/places/${{ secrets.ROBLOX_PLACE_ID }}/versions?versionType=Published" \
            -H "x-api-key: ${{ secrets.ROBLOX_API_KEY }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @planet-miner-build.rbxl)
          echo "Roblox API response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"versionNumber"' || (echo "Upload failed" && exit 1)
